
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixIt New Issue Patch</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f1ea;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
width:min(500px,90%);
text-align:center;
}
button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#202020;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:15px;
}
</style>
</head>
<body>

<div class="card" id="homePage">
<h1>🔧 Start New Issue</h1>
<p>Select what you're trying to fix.</p>

<button onclick="startIssue()">Garbage Disposal</button>
<button>Sink Faucet</button>
<button>Toilet</button>
<button>Dishwasher</button>
</div>

<div class="card" id="diagnosticPage" style="display:none;">
<h1>Garbage Disposal Issue</h1>
<p>Question flow would continue here.</p>

<button onclick="goHome()">＋ New Issue</button>
</div>

<script>
function startIssue(){
document.getElementById("homePage").style.display = "none";
document.getElementById("diagnosticPage").style.display = "block";
}

function goHome(){
document.getElementById("diagnosticPage").style.display = "none";
document.getElementById("homePage").style.display = "block";
window.scrollTo(0,0);
}
</script>

</body>
</html>
